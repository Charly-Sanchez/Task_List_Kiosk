<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk TV Display</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23111318'/%3E%3Cpath d='M16 18h32v8H16zM16 30h24v8H16zM16 42h18v8H16z' fill='%237a8da6'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="display-mode tv-layout">
    <div id="connection-screen" class="full-screen-center">
        <h1 class="cyber-title">ESPERANDO CONEXIÓN...</h1>
        <div id="qrcode"></div>
        <p class="connection-id-display">ID: <span id="my-id">Generando...</span></p>
        <p class="instructions">Escanea el código QR o ingresa el ID en el Modo Control.</p>
    </div>

    <div id="app-content" class="hidden full-screen">
        <div id="tv-id-corner" class="tv-id-corner">TV ID: --</div>

        <!-- Announcements Layer -->
        <div id="announcement-layer" class="layer hidden">
            <div id="announcement-box" class="announcement-box">
                <h1 id="announcement-text" class="text-glow"></h1>
            </div>
        </div>

        <!-- Task List Layer -->
        <div id="tasks-layer" class="layer hidden">
            <h2 class="section-title">LISTA DE TAREAS</h2>
            <div class="tasks-viewport">
                <div class="tasks-center-marker"></div>
                <div class="tasks-container" id="tv-tasks"></div>
            </div>
        </div>

        <div class="status-indicator">● CONECTADO</div>
    </div>

    <script type="module" src="js/display.js"></script>
</body>
</html>
