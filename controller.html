<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Remoto Kiosk</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23111318'/%3E%3Cpath d='M16 18h32v8H16zM16 30h24v8H16zM16 42h18v8H16z' fill='%237a8da6'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="control-mode">
    <div class="glass-panel" id="connect-panel">
        <h2 class="neon-text">CONECTAR A LA TV</h2>
        <input type="text" id="target-id" class="cyber-input" placeholder="INGRESA EL ID DE LA TV Ej. TV-1234">
        <button id="connect-btn" class="cyber-button full-width"><span class="btn-text">CONECTAR</span></button>
        <p id="connection-status" class="status-msg">Desconectado</p>
    </div>

    <div class="glass-panel hidden" id="control-panel">
        <div class="tabs">
            <button class="tab-btn active" data-target="tab-anuncios">Anuncio</button>
            <button class="tab-btn" data-target="tab-tareas">Tareas</button>
        </div>

        <div id="tab-anuncios" class="tab-content active">
            <h3 class="neon-text" style="margin-bottom:15px">Editor de Anuncios</h3>

            <div class="editor-toolbar">
                <button type="button" class="cyber-button-small format-btn" data-cmd="bold">B</button>
                <button type="button" class="cyber-button-small format-btn" data-cmd="italic">I</button>
                <button type="button" class="cyber-button-small format-btn" data-cmd="underline">U</button>
            </div>

            <div id="announcement-editor" class="rich-editor" contenteditable="true" spellcheck="true" data-placeholder="Escribe el anuncio aqui..."></div>

            <div class="controls-row">
                <label>Alineacion:</label>
                <select id="align-select" class="cyber-select" style="margin-bottom:0px">
                    <option value="center">Centro</option>
                    <option value="left">Izquierda</option>
                    <option value="right">Derecha</option>
                </select>
            </div>

            <div class="controls-row">
                <label>Fuente:</label>
                <select id="font-select" class="cyber-select" style="margin-bottom:0px">
                    <option value="Orbitron">Orbitron</option>
                    <option value="Rajdhani">Rajdhani</option>
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Tahoma">Tahoma</option>
                    <option value="Verdana">Verdana</option>
                </select>
            </div>

            <div class="controls-row">
                <label>Tamano Texto:</label>
                <span class="auto-size-badge">Automatico</span>
            </div>

            <button id="add-announcement-btn" class="cyber-button full-width"><span class="btn-text">AGREGAR A COLA</span></button>

            <div id="announcement-list" class="announcement-list"></div>

            <button id="send-announcements" class="cyber-button secondary full-width mt-10"><span class="btn-text">PROYECTAR ANUNCIOS</span></button>
        </div>

        <div id="tab-tareas" class="tab-content hidden">
            <h3 class="neon-text" style="margin-bottom:15px">Lista de Tareas</h3>
            <div class="task-add-row">
                <input type="text" id="new-task-input" class="cyber-input" placeholder="Nueva tarea...">
                <button id="add-task-btn" class="cyber-button-small">+</button>
            </div>
            
            <div id="mobile-tasks" class="mobile-tasks-container">
            </div>
            <button id="sync-tasks-btn" class="cyber-button secondary full-width mt-10"><span class="btn-text">PROYECTAR TAREAS</span></button>
        </div>
        
        <button id="disconnect-btn" class="cyber-button danger full-width mt-10"><span class="btn-text">DESCONECTAR</span></button>
        <button id="reset-kiosk-btn" class="cyber-button danger full-width mt-10"><span class="btn-text">RESET TOTAL (TAREAS/ANUNCIOS/HISTORIAL)</span></button>

    </div>

    <script type="module" src="js/controller.js"></script>
</body>
</html>
